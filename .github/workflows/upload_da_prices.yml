name: Weekly DA Price Upload

on:
  # 每週一 UTC 01:00 執行（台灣時間週一早上 09:00）
  # 上傳前 7 天的資料，upsert 設計確保重複執行不會產生重複資料
  schedule:
    - cron: "0 1 * * 1"

  # 保留手動觸發，方便補抓特定區間
  workflow_dispatch:
    inputs:
      start_date:
        description: "起始日期 (YYYY-MM-DD)"
        required: true
        default: ""
      end_date:
        description: "結束日期 (YYYY-MM-DD)"
        required: true
        default: ""
      zones:
        description: "Zone 清單，空格分隔 (留空=全部)"
        required: false
        default: ""

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt supabase

      - name: Compute date range (scheduled run)
        if: github.event_name == 'schedule'
        run: |
          echo "START_DATE=$(date -d '8 days ago' +%Y-%m-%d)" >> $GITHUB_ENV
          echo "END_DATE=$(date -d 'yesterday' +%Y-%m-%d)"    >> $GITHUB_ENV
          echo "ZONES=FR CH ES PT NL IT-North IT-South"       >> $GITHUB_ENV

      - name: Use manual date range (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "START_DATE=${{ github.event.inputs.start_date }}" >> $GITHUB_ENV
          echo "END_DATE=${{ github.event.inputs.end_date }}"     >> $GITHUB_ENV
          ZONES="${{ github.event.inputs.zones }}"
          if [ -z "$ZONES" ]; then
            ZONES="FR CH ES PT NL IT-North IT-South"
          fi
          echo "ZONES=$ZONES" >> $GITHUB_ENV

      - name: Upload DA prices to Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ENTSOE_TOKEN:         ${{ secrets.ENTSOE_TOKEN }}
        run: |
          python scripts/upload_da_prices.py \
            --start $START_DATE \
            --end   $END_DATE \
            --zones $ZONES

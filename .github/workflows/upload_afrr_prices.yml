name: Daily aFRR Price Upload

on:
  # 每天 UTC 01:30 執行（台灣時間早上 09:30）
  # 上傳昨天的資料，upsert 設計確保重複執行不會產生重複資料
  schedule:
    - cron: "30 1 * * *"

  # 手動觸發，方便補抓特定區間或回填歷史資料
  workflow_dispatch:
    inputs:
      start_date:
        description: "起始日期 (YYYY-MM-DD)"
        required: true
        default: ""
      end_date:
        description: "結束日期 (YYYY-MM-DD)"
        required: true
        default: ""
      countries:
        description: "國家代碼清單，空格分隔 (留空=預設 FR ES PT)"
        required: false
        default: ""

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute date range (scheduled run)
        if: github.event_name == 'schedule'
        run: |
          echo "START_DATE=$(date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_ENV
          echo "END_DATE=$(date -d 'yesterday' +%Y-%m-%d)"   >> $GITHUB_ENV
          echo "COUNTRIES=FR ES PT"                          >> $GITHUB_ENV

      - name: Use manual date range (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "START_DATE=${{ github.event.inputs.start_date }}" >> $GITHUB_ENV
          echo "END_DATE=${{ github.event.inputs.end_date }}"     >> $GITHUB_ENV
          COUNTRIES="${{ github.event.inputs.countries }}"
          if [ -z "$COUNTRIES" ]; then
            COUNTRIES="FR ES PT"
          fi
          echo "COUNTRIES=$COUNTRIES" >> $GITHUB_ENV

      - name: Upload aFRR prices to Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ENTSOE_TOKEN:         ${{ secrets.ENTSOE_TOKEN }}
        run: |
          python scripts/upload_afrr_prices.py \
            --start $START_DATE \
            --end   $END_DATE \
            --countries $COUNTRIES
